# ─────────────────────────────────────────────────────────────────
# Phase 4: GitHub Actions CI/CD Pipeline
# File   : .github/workflows/main.yml
# Trigger: Every git push to main or any pull_request
# Jobs   : lint → test → docker-build
# ─────────────────────────────────────────────────────────────────

name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: iris-classifier

jobs:

  # ── Job 1: Lint & Static Analysis ────────────────────────────────
  lint:
    name: 🔍 Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check code formatting (black)
        run: black --check --diff .

      - name: Check import ordering (isort)
        run: isort --check-only --diff .

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__

  # ── Job 2: Test Suite (model quality gate) ───────────────────────
  test:
    name: 🧪 Run Pytest Suite
    runs-on: ubuntu-latest
    needs: lint            # Only runs if lint passes

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull model artifacts via DVC
        run: |
          pip install dvc
          dvc pull               # Download model from DVC remote (S3/GCS/local)
        # Note: Configure DVC remote credentials as GitHub Secrets:
        # Settings → Secrets → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --tb=short \
            --junitxml=reports/junit.xml   # Machine-readable test results

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: pytest-results
          path: reports/junit.xml

  # ── Job 3: Build & Push Docker Image ────────────────────────────
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test            # Only runs if tests pass

    steps:
      - uses: actions/checkout@v3

      - name: Set image tag from git SHA
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:$TAG \
            -t $IMAGE_NAME:latest \
            .

      - name: Smoke test container
        run: |
          docker run -d -p 8080:80 --name test-api $IMAGE_NAME:latest
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-api

      # Uncomment to push to DockerHub / GCR / ECR:
      # - name: Push to registry
      #   run: |
      #     docker login -u ${{ secrets.DOCKERHUB_USERNAME }} \
      #                  -p ${{ secrets.DOCKERHUB_TOKEN }}
      #     docker push $IMAGE_NAME:latest

  # ── Job 4: Drift Monitoring (scheduled, not on push) ────────────
  drift-check:
    name: 📊 Data Drift Monitoring
    runs-on: ubuntu-latest
    # Runs daily at 02:00 UTC — separate from push pipeline
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift detection
        run: python drift_report.py

      - name: Upload drift report
        uses: actions/upload-artifact@v3
        with:
          name: drift-report
          path: reports/drift_report.html

      - name: Alert on drift (fail job if drift detected)
        run: |
          python3 -c "
          import json
          with open('models/drift_results.json') as f:
              results = json.load(f)
          drifted = [r['feature'] for r in results if r['drift_detected']]
          if drifted:
              print('DRIFT DETECTED in:', drifted)
              exit(1)
          print('No significant drift detected.')
          "
